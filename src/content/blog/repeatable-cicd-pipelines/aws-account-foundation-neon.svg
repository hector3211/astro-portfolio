<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">AWS multi-account foundation</title>
  <desc id="desc">IAM Identity Center routes people through permission sets into isolated development and production AWS accounts protected by budget alarms.</desc>
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="75%"><stop stop-color="#0c2450"/><stop offset=".55" stop-color="#050d20"/><stop offset="1" stop-color="#020713"/></radialGradient>
    <linearGradient id="purple" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#b16cff"/><stop offset="1" stop-color="#5b31e8"/></linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#46b8ff"/><stop offset="1" stop-color="#145ee8"/></linearGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse"><path d="M32 0H0V32" fill="none" stroke="#248fff" stroke-opacity=".08"/></pattern>
    <filter id="blueGlow" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="7" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="purpleGlow" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0L10 5 0 10Z" fill="#46b8ff"/></marker>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <rect width="1200" height="675" fill="url(#grid)"/>
  <g opacity=".5" fill="none" stroke="#248fff" stroke-width="2"><path d="M22 103h104c19 0 19-28 1-31-5-37-58-40-70-6-22-4-35 11-35 37z"/><path d="M1077 102h100c15 0 16-24 1-27-5-32-50-35-61-6-20-3-31 10-31 33z"/><path d="M0 603h1200"/><path d="M70 603l-38 72M1130 603l38 72M260 603l-17 72M940 603l17 72" opacity=".25"/></g>
  <text x="600" y="59" text-anchor="middle" fill="#fff" font-family="system-ui, sans-serif" font-size="36" font-weight="800">AWS Account Foundation</text>
  <text x="600" y="89" text-anchor="middle" fill="#78bfff" font-family="system-ui, sans-serif" font-size="18">Identity first. Isolation by design. Cost visibility everywhere.</text>
  <path d="M258 103h684" stroke="#248fff" stroke-opacity=".5"/><circle cx="258" cy="103" r="4" fill="#46b8ff"/><circle cx="942" cy="103" r="4" fill="#46b8ff"/>

  <g filter="url(#blueGlow)"><rect x="410" y="126" width="380" height="105" rx="15" fill="#07152b" stroke="#46b8ff" stroke-width="2"/></g>
  <g transform="translate(443 150)" fill="none" stroke="#46b8ff" stroke-width="3"><circle cx="24" cy="20" r="11"/><path d="M5 56c2-18 36-18 38 0M48 14h38M48 30h30M48 46h35"/></g>
  <text x="548" y="166" fill="#fff" font-family="system-ui, sans-serif" font-size="22" font-weight="700">IAM Identity Center</text>
  <text x="548" y="194" fill="#a8c7e4" font-family="system-ui, sans-serif" font-size="15">One sign-in for users and groups</text>
  <rect x="548" y="204" width="159" height="20" rx="10" fill="#10396a"/><text x="627" y="219" text-anchor="middle" fill="#68c6ff" font-family="ui-monospace, monospace" font-size="12">PERMISSION SETS</text>

  <path d="M500 231v42c0 17-173 8-173 43" fill="none" stroke="#46b8ff" stroke-width="3" stroke-dasharray="7 6" marker-end="url(#arrowBlue)"/>
  <path d="M700 231v42c0 17 173 8 173 43" fill="none" stroke="#9b62ff" stroke-width="3" stroke-dasharray="7 6" marker-end="url(#arrowBlue)"/>

  <g filter="url(#blueGlow)"><rect x="75" y="323" width="500" height="205" rx="17" fill="#061225" stroke="#299eff" stroke-width="2"/></g>
  <rect x="96" y="344" width="78" height="78" rx="14" fill="url(#blue)"/>
  <path d="M117 382h36M135 364v36M111 406h48" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
  <text x="194" y="366" fill="#fff" font-family="system-ui, sans-serif" font-size="25" font-weight="700">Development Account</text>
  <text x="194" y="395" fill="#55bdff" font-family="system-ui, sans-serif" font-size="15">EXPERIMENT WITHOUT PRODUCTION RISK</text>
  <rect x="96" y="444" width="448" height="60" rx="10" fill="#081b35" stroke="#1f6fb7"/>
  <text x="117" y="469" fill="#d9ecff" font-family="ui-monospace, monospace" font-size="14">pull request previews  /  terraform plan</text>
  <text x="117" y="491" fill="#78a6ce" font-family="ui-monospace, monospace" font-size="13">scoped access  /  disposable experiments</text>

  <g filter="url(#purpleGlow)"><rect x="625" y="323" width="500" height="205" rx="17" fill="#0c1029" stroke="#9458ff" stroke-width="2"/></g>
  <rect x="646" y="344" width="78" height="78" rx="14" fill="url(#purple)"/>
  <path d="M685 358l25 10v20c0 17-11 28-25 34-14-6-25-17-25-34v-20z" fill="none" stroke="#fff" stroke-width="3"/><path d="M674 386l8 8 15-19" fill="none" stroke="#fff" stroke-width="3"/>
  <text x="744" y="366" fill="#fff" font-family="system-ui, sans-serif" font-size="25" font-weight="700">Production Account</text>
  <text x="744" y="395" fill="#bd8cff" font-family="system-ui, sans-serif" font-size="15">CHANGES REQUIRE INTENT</text>
  <rect x="646" y="444" width="448" height="60" rx="10" fill="#15102d" stroke="#6839bd"/>
  <text x="667" y="469" fill="#eee2ff" font-family="ui-monospace, monospace" font-size="14">approval gate  /  separate apply role</text>
  <text x="667" y="491" fill="#ae91d2" font-family="ui-monospace, monospace" font-size="13">auditable access  /  smaller blast radius</text>

  <g filter="url(#blueGlow)"><rect x="162" y="562" width="876" height="76" rx="15" fill="#061326" stroke="#298fff"/></g>
  <circle cx="205" cy="600" r="23" fill="#0e315e" stroke="#46b8ff"/><path d="M205 585v17l12 7" fill="none" stroke="#62c7ff" stroke-width="3" stroke-linecap="round"/>
  <text x="244" y="592" fill="#fff" font-family="system-ui, sans-serif" font-size="19" font-weight="700">AWS Budgets and billing alarms</text>
  <text x="244" y="618" fill="#91afd0" font-family="system-ui, sans-serif" font-size="14">Early warning thresholds surround every environment with cost guardrails.</text>
  <rect x="855" y="581" width="149" height="38" rx="8" fill="#102f26" stroke="#55d68b"/><text x="929" y="605" text-anchor="middle" fill="#70e9a4" font-family="ui-monospace, monospace" font-size="13">COST VISIBLE</text>
</svg>
